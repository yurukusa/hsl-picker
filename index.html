<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSL Color Picker</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  header span {
    font-size: 13px;
    color: var(--text2);
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 20px;
  }

  @media (max-width: 860px) {
    .container {
      grid-template-columns: 1fr;
      padding: 16px;
    }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }

  /* === Color Wheel === */
  #wheel-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    position: relative;
  }

  #hueCanvas {
    cursor: crosshair;
    border-radius: 50%;
    display: block;
    touch-action: none;
    max-width: 100%;
  }

  /* === Sliders === */
  .slider-group {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 20px;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .slider-label {
    width: 22px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    flex-shrink: 0;
  }

  .slider-row input[type="range"] {
    flex: 1;
    height: 8px;
    border-radius: 4px;
    outline: none;
    border: none;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--text);
    border: 2px solid var(--bg);
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    cursor: pointer;
  }

  input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--text);
    border: 2px solid var(--bg);
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    cursor: pointer;
    border: none;
  }

  .slider-val {
    width: 40px;
    text-align: right;
    font-size: 13px;
    color: var(--text2);
    flex-shrink: 0;
  }

  /* === Preview === */
  #preview-wrap {
    display: flex;
    gap: 12px;
    align-items: stretch;
    margin-bottom: 20px;
  }

  #preview-swatch {
    flex: 1;
    height: 80px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background-image: linear-gradient(45deg, #555 25%, transparent 25%),
                      linear-gradient(-45deg, #555 25%, transparent 25%),
                      linear-gradient(45deg, transparent 75%, #555 75%),
                      linear-gradient(-45deg, transparent 75%, #555 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    background-color: #333;
    position: relative;
    overflow: hidden;
  }

  #preview-color {
    position: absolute;
    inset: 0;
    border-radius: 7px;
  }

  #preview-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }

  #preview-hex-big {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  #preview-hex-big:hover { color: var(--accent); }

  #preview-hsl-small {
    font-size: 12px;
    color: var(--text2);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  /* === Format Outputs === */
  .formats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 4px;
  }

  .format-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .format-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
  }

  .format-row {
    display: flex;
    gap: 4px;
  }

  .format-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    padding: 6px 8px;
    outline: none;
    min-width: 0;
  }

  .format-input:focus {
    border-color: var(--accent);
  }

  .copy-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    cursor: pointer;
    padding: 6px 8px;
    font-size: 13px;
    flex-shrink: 0;
    transition: all 0.15s;
    line-height: 1;
  }

  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .copy-btn.copied {
    border-color: var(--green);
    color: var(--green);
  }

  /* === Right Column === */
  .right-col {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* === Harmonies === */
  .harmony-tabs {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .harmony-tab {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    cursor: pointer;
    padding: 5px 10px;
    font-size: 12px;
    transition: all 0.15s;
  }

  .harmony-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .harmony-tab:hover:not(.active) {
    border-color: var(--accent);
    color: var(--accent);
  }

  .harmony-swatches {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  .harmony-swatch-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  .harmony-swatch {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    border: 2px solid var(--border);
    transition: transform 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .harmony-swatch-wrap:hover .harmony-swatch {
    transform: scale(1.08);
    border-color: var(--accent);
  }

  .harmony-hex {
    font-size: 11px;
    color: var(--text2);
    font-family: 'SF Mono', 'Fira Code', monospace;
    letter-spacing: 0.02em;
  }

  .harmony-label {
    font-size: 10px;
    color: var(--text2);
    opacity: 0.7;
  }

  /* === Tints & Shades === */
  .tints-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .tint-swatch-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }

  .tint-swatch {
    width: 52px;
    height: 44px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.08);
    transition: transform 0.15s;
    flex-shrink: 0;
  }

  .tint-swatch-wrap:hover .tint-swatch {
    transform: scale(1.1);
    border-color: var(--accent);
  }

  .tint-label {
    font-size: 10px;
    color: var(--text2);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  /* === Recent Colors === */
  .recent-swatches {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .recent-swatch {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .recent-swatch:hover {
    transform: scale(1.15);
    border-color: var(--accent);
  }

  .no-recent {
    font-size: 13px;
    color: var(--text2);
  }

  /* === HSL Number Inputs === */
  .hsl-inputs {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }

  .hsl-input-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .hsl-input-wrap label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
  }

  .hsl-input-wrap input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    padding: 7px 8px;
    outline: none;
    text-align: center;
    -moz-appearance: textfield;
  }

  .hsl-input-wrap input[type="number"]::-webkit-outer-spin-button,
  .hsl-input-wrap input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
  }

  .hsl-input-wrap input[type="number"]:focus {
    border-color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
    <circle cx="11" cy="11" r="10" stroke="#30363d" stroke-width="1.5"/>
    <path d="M11 1 A10 10 0 0 1 21 11" stroke="#f85149" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M21 11 A10 10 0 0 1 11 21" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M11 21 A10 10 0 0 1 1 11" stroke="#d29922" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M1 11 A10 10 0 0 1 11 1" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="11" cy="11" r="3.5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  </svg>
  <h1>HSL Color Picker</h1>
  <span>Wheel &middot; Harmonies &middot; Tints &amp; Shades &middot; Format Conversion</span>
</header>

<div class="container">

  <!-- LEFT COLUMN -->
  <div style="display:flex;flex-direction:column;gap:20px;">

    <!-- Wheel Card -->
    <div class="card">
      <div class="card-title">Color Wheel</div>

      <div id="wheel-wrap">
        <canvas id="hueCanvas" width="320" height="320"></canvas>
      </div>

      <!-- HSL number inputs -->
      <div class="hsl-inputs">
        <div class="hsl-input-wrap">
          <label for="in-h">H (0-360)</label>
          <input type="number" id="in-h" min="0" max="360" step="1">
        </div>
        <div class="hsl-input-wrap">
          <label for="in-s">S (0-100)</label>
          <input type="number" id="in-s" min="0" max="100" step="1">
        </div>
        <div class="hsl-input-wrap">
          <label for="in-l">L (0-100)</label>
          <input type="number" id="in-l" min="0" max="100" step="1">
        </div>
      </div>

      <div class="slider-group" style="margin-top:14px;">
        <div class="slider-row">
          <span class="slider-label">S</span>
          <input type="range" id="sl-s" min="0" max="100" step="1">
          <span class="slider-val" id="lbl-s">100%</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">L</span>
          <input type="range" id="sl-l" min="0" max="100" step="1">
          <span class="slider-val" id="lbl-l">50%</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">A</span>
          <input type="range" id="sl-a" min="0" max="100" step="1">
          <span class="slider-val" id="lbl-a">100%</span>
        </div>
      </div>

      <!-- Preview -->
      <div id="preview-wrap">
        <div id="preview-swatch">
          <div id="preview-color"></div>
        </div>
        <div id="preview-info">
          <div id="preview-hex-big" title="Click to copy">#FF0000</div>
          <div id="preview-hsl-small">hsl(0, 100%, 50%)</div>
        </div>
      </div>
    </div>

    <!-- Formats Card -->
    <div class="card">
      <div class="card-title">Format Outputs</div>
      <div class="formats-grid">
        <div class="format-item">
          <div class="format-label">HSL</div>
          <div class="format-row">
            <input class="format-input" id="fmt-hsl" type="text" spellcheck="false">
            <button class="copy-btn" data-target="fmt-hsl" title="Copy">&#x2398;</button>
          </div>
        </div>
        <div class="format-item">
          <div class="format-label">HSLA</div>
          <div class="format-row">
            <input class="format-input" id="fmt-hsla" type="text" spellcheck="false">
            <button class="copy-btn" data-target="fmt-hsla" title="Copy">&#x2398;</button>
          </div>
        </div>
        <div class="format-item">
          <div class="format-label">RGB</div>
          <div class="format-row">
            <input class="format-input" id="fmt-rgb" type="text" spellcheck="false">
            <button class="copy-btn" data-target="fmt-rgb" title="Copy">&#x2398;</button>
          </div>
        </div>
        <div class="format-item">
          <div class="format-label">RGBA</div>
          <div class="format-row">
            <input class="format-input" id="fmt-rgba" type="text" spellcheck="false">
            <button class="copy-btn" data-target="fmt-rgba" title="Copy">&#x2398;</button>
          </div>
        </div>
        <div class="format-item">
          <div class="format-label">HEX</div>
          <div class="format-row">
            <input class="format-input" id="fmt-hex" type="text" spellcheck="false">
            <button class="copy-btn" data-target="fmt-hex" title="Copy">&#x2398;</button>
          </div>
        </div>
        <div class="format-item">
          <div class="format-label">HEX8</div>
          <div class="format-row">
            <input class="format-input" id="fmt-hex8" type="text" spellcheck="false">
            <button class="copy-btn" data-target="fmt-hex8" title="Copy">&#x2398;</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- RIGHT COLUMN -->
  <div class="right-col">

    <!-- Harmonies Card -->
    <div class="card">
      <div class="card-title">Color Harmonies</div>
      <div class="harmony-tabs">
        <button class="harmony-tab active" data-harmony="complementary">Complementary</button>
        <button class="harmony-tab" data-harmony="analogous">Analogous</button>
        <button class="harmony-tab" data-harmony="triadic">Triadic</button>
        <button class="harmony-tab" data-harmony="split">Split-Comp</button>
        <button class="harmony-tab" data-harmony="tetradic">Tetradic</button>
      </div>
      <div class="harmony-swatches" id="harmony-swatches"></div>
    </div>

    <!-- Tints & Shades Card -->
    <div class="card">
      <div class="card-title">Tints &amp; Shades</div>
      <div class="tints-row" id="tints-row"></div>
    </div>

    <!-- Recent Colors Card -->
    <div class="card">
      <div class="card-title">Recent Colors <span style="font-weight:400;text-transform:none;letter-spacing:0;">(last 12)</span></div>
      <div class="recent-swatches" id="recent-swatches">
        <div class="no-recent">No recent colors yet.</div>
      </div>
    </div>

  </div>
</div>

<script>
// ======================================================
// State
// ======================================================
const state = {
  h: 0,    // 0-360
  s: 100,  // 0-100
  l: 50,   // 0-100
  a: 100,  // 0-100 (opacity)
};

let activeHarmony = 'complementary';
let isDragging = false;
let dragZone = null;

// ======================================================
// Color Math
// ======================================================
function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function hslToHex(h, s, l) {
  return rgbToHex(...hslToRgb(h, s, l));
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) {
    h = s = 0;
  } else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
}

function parseColorInput(str) {
  str = str.trim();

  // HSL / HSLA
  const hslM = str.match(/^hsla?\(\s*(\d+(?:\.\d+)?)\s*,\s*(\d+(?:\.\d+)?)%?\s*,\s*(\d+(?:\.\d+)?)%?\s*(?:,\s*(\d+(?:\.\d+)?))?\s*\)$/i);
  if (hslM) {
    return {
      h: Math.round(parseFloat(hslM[1])) % 360,
      s: Math.round(parseFloat(hslM[2])),
      l: Math.round(parseFloat(hslM[3])),
      a: hslM[4] !== undefined ? Math.round(parseFloat(hslM[4]) * 100) : 100
    };
  }

  // RGB / RGBA
  const rgbM = str.match(/^rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*(?:,\s*(\d+(?:\.\d+)?))?\s*\)$/i);
  if (rgbM) {
    const [hh, ss, ll] = rgbToHsl(parseInt(rgbM[1]), parseInt(rgbM[2]), parseInt(rgbM[3]));
    const aa = rgbM[4] !== undefined ? Math.round(parseFloat(rgbM[4]) * 100) : 100;
    return { h: hh, s: ss, l: ll, a: aa };
  }

  // HEX (3, 6, 8 digits)
  const hexM = str.match(/^#?([0-9a-fA-F]{3}|[0-9a-fA-F]{6}|[0-9a-fA-F]{8})$/);
  if (hexM) {
    let hex = hexM[1];
    if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
    const r = parseInt(hex.slice(0, 2), 16);
    const g = parseInt(hex.slice(2, 4), 16);
    const b = parseInt(hex.slice(4, 6), 16);
    const [hh, ss, ll] = rgbToHsl(r, g, b);
    const aa = hex.length === 8 ? Math.round(parseInt(hex.slice(6, 8), 16) / 255 * 100) : 100;
    return { h: hh, s: ss, l: ll, a: aa };
  }

  return null;
}

// ======================================================
// Canvas Wheel
// ======================================================
const canvas = document.getElementById('hueCanvas');
const ctx = canvas.getContext('2d');
const SIZE = 320;
const CX = SIZE / 2;
const CY = SIZE / 2;
const RING_OUTER = CX - 4;
const RING_INNER = CX - 32;  // ring width = 28px

function drawWheel() {
  ctx.clearRect(0, 0, SIZE, SIZE);

  // --- Hue ring ---
  // Draw 360 arc segments
  for (let deg = 0; deg < 360; deg++) {
    const start = (deg - 0.5 - 90) * Math.PI / 180;
    const end   = (deg + 0.5 - 90) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, RING_OUTER, start, end);
    ctx.closePath();
    ctx.fillStyle = `hsl(${deg}, 100%, 50%)`;
    ctx.fill();
  }

  // Punch out center with compositing
  ctx.save();
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.arc(CX, CY, RING_INNER, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // --- SL square inscribed in inner circle ---
  // Side of the largest square fitting in a circle of radius RING_INNER
  const sqHalf = RING_INNER / Math.SQRT2;
  const sqX = CX - sqHalf;
  const sqY = CY - sqHalf;
  const sqSide = sqHalf * 2;

  // White -> hue (horizontal)
  const gradH = ctx.createLinearGradient(sqX, 0, sqX + sqSide, 0);
  gradH.addColorStop(0, '#ffffff');
  gradH.addColorStop(1, `hsl(${state.h}, 100%, 50%)`);
  ctx.fillStyle = gradH;
  ctx.fillRect(sqX, sqY, sqSide, sqSide);

  // Transparent -> black (vertical overlay)
  const gradV = ctx.createLinearGradient(0, sqY, 0, sqY + sqSide);
  gradV.addColorStop(0, 'rgba(0,0,0,0)');
  gradV.addColorStop(1, 'rgba(0,0,0,1)');
  ctx.fillStyle = gradV;
  ctx.fillRect(sqX, sqY, sqSide, sqSide);

  // --- Hue indicator on ring ---
  const hRad = (state.h - 90) * Math.PI / 180;
  const midR = (RING_OUTER + RING_INNER) / 2;
  const ix = CX + midR * Math.cos(hRad);
  const iy = CY + midR * Math.sin(hRad);

  ctx.beginPath();
  ctx.arc(ix, iy, 12, 0, Math.PI * 2);
  ctx.fillStyle = `hsl(${state.h}, 100%, 50%)`;
  ctx.fill();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // --- SL cursor ---
  // Map S (0-100) -> x, L (0-100) -> y (inverted: 100=top, 0=bottom)
  const cx_ = sqX + (state.s / 100) * sqSide;
  const cy_ = sqY + (1 - state.l / 100) * sqSide;

  // Outer white ring
  ctx.beginPath();
  ctx.arc(cx_, cy_, 9, 0, Math.PI * 2);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  // Inner black ring
  ctx.beginPath();
  ctx.arc(cx_, cy_, 7, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = SIZE / rect.width;
  const scaleY = SIZE / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top)  * scaleY
  };
}

function hitTest(x, y) {
  const dx = x - CX, dy = y - CY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist >= RING_INNER && dist <= RING_OUTER) return 'ring';

  const sqHalf = RING_INNER / Math.SQRT2;
  if (x >= CX - sqHalf && x <= CX + sqHalf &&
      y >= CY - sqHalf && y <= CY + sqHalf) return 'square';

  return null;
}

function applyDrag(x, y) {
  if (dragZone === 'ring') {
    let angle = Math.atan2(y - CY, x - CX) * 180 / Math.PI + 90;
    if (angle < 0) angle += 360;
    state.h = Math.round(angle % 360);
  } else if (dragZone === 'square') {
    const sqHalf = RING_INNER / Math.SQRT2;
    const px = Math.max(0, Math.min(sqHalf * 2, x - (CX - sqHalf)));
    const py = Math.max(0, Math.min(sqHalf * 2, y - (CY - sqHalf)));
    state.s = Math.round((px / (sqHalf * 2)) * 100);
    state.l = Math.round((1 - py / (sqHalf * 2)) * 100);
  }
  refresh();
}

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  const {x, y} = getCanvasCoords(e);
  dragZone = hitTest(x, y);
  if (dragZone) { isDragging = true; applyDrag(x, y); }
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  e.preventDefault();
  const {x, y} = getCanvasCoords(e);
  applyDrag(x, y);
});

window.addEventListener('mouseup', () => {
  if (isDragging) addToRecent();
  isDragging = false; dragZone = null;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const {x, y} = getCanvasCoords(e);
  dragZone = hitTest(x, y);
  if (dragZone) { isDragging = true; applyDrag(x, y); }
}, {passive: false});

canvas.addEventListener('touchmove', e => {
  if (!isDragging) return;
  e.preventDefault();
  const {x, y} = getCanvasCoords(e);
  applyDrag(x, y);
}, {passive: false});

window.addEventListener('touchend', () => {
  if (isDragging) addToRecent();
  isDragging = false; dragZone = null;
});

// ======================================================
// Sliders
// ======================================================
const slS = document.getElementById('sl-s');
const slL = document.getElementById('sl-l');
const slA = document.getElementById('sl-a');
const lblS = document.getElementById('lbl-s');
const lblL = document.getElementById('lbl-l');
const lblA = document.getElementById('lbl-a');

function updateSliderTracks() {
  const h = state.h, s = state.s, l = state.l;

  // S: desaturated version of current hue/lightness on left, full saturation on right
  const leftS  = `hsl(${h}, 0%, ${l}%)`;
  const rightS = `hsl(${h}, 100%, ${l}%)`;
  slS.style.background = `linear-gradient(to right, ${leftS}, ${rightS})`;

  // L: black -> hue at 50% -> white
  slL.style.background = `linear-gradient(to right, #000, hsl(${h},${s}%,50%), #fff)`;

  // A: checkerboard + hue overlay handled via box-shadow trick
  const colorFull = `hsl(${h},${s}%,${l}%)`;
  slA.style.background = `
    linear-gradient(to right, rgba(0,0,0,0), ${colorFull}),
    repeating-conic-gradient(#555 0% 25%, #333 0% 50%) 0 0 / 12px 12px`;
}

slS.addEventListener('input', () => { state.s = +slS.value; refresh(); });
slL.addEventListener('input', () => { state.l = +slL.value; refresh(); });
slA.addEventListener('input', () => { state.a = +slA.value; refresh(); });
slS.addEventListener('change', addToRecent);
slL.addEventListener('change', addToRecent);
slA.addEventListener('change', addToRecent);

// ======================================================
// Number Inputs (H, S, L)
// ======================================================
const inH = document.getElementById('in-h');
const inS = document.getElementById('in-s');
const inL = document.getElementById('in-l');

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

inH.addEventListener('change', () => {
  const v = parseInt(inH.value);
  if (!isNaN(v)) { state.h = ((v % 360) + 360) % 360; refresh(); addToRecent(); }
});
inS.addEventListener('change', () => {
  const v = parseInt(inS.value);
  if (!isNaN(v)) { state.s = clamp(v, 0, 100); refresh(); addToRecent(); }
});
inL.addEventListener('change', () => {
  const v = parseInt(inL.value);
  if (!isNaN(v)) { state.l = clamp(v, 0, 100); refresh(); addToRecent(); }
});

// ======================================================
// Format Inputs (editable)
// ======================================================
['fmt-hsl','fmt-hsla','fmt-rgb','fmt-rgba','fmt-hex','fmt-hex8'].forEach(id => {
  document.getElementById(id).addEventListener('change', function() {
    const parsed = parseColorInput(this.value);
    if (parsed) {
      Object.assign(state, { h: parsed.h, s: parsed.s, l: parsed.l, a: parsed.a });
      refresh();
      addToRecent();
    } else {
      updateFormats(); // restore
    }
  });
});

// Copy buttons
document.querySelectorAll('.copy-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const val = document.getElementById(btn.dataset.target).value;
    navigator.clipboard.writeText(val).then(() => {
      btn.classList.add('copied');
      btn.textContent = '\u2713';
      setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '&#x2398;'; }, 1500);
    }).catch(() => {
      // Fallback for non-secure contexts
      const ta = document.createElement('textarea');
      ta.value = val; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      btn.classList.add('copied'); btn.textContent = '\u2713';
      setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '&#x2398;'; }, 1500);
    });
  });
});

// Preview hex click to copy
document.getElementById('preview-hex-big').addEventListener('click', () => {
  const hex = hslToHex(state.h, state.s, state.l).toUpperCase();
  const el = document.getElementById('preview-hex-big');
  navigator.clipboard.writeText(hex).catch(() => {});
  el.textContent = 'Copied!';
  setTimeout(() => { el.textContent = hex; }, 1200);
});

// ======================================================
// Harmonies
// ======================================================
document.querySelectorAll('.harmony-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.harmony-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeHarmony = tab.dataset.harmony;
    updateHarmonies();
  });
});

function harmonyHues(h) {
  switch (activeHarmony) {
    case 'complementary': return [h, (h + 180) % 360];
    case 'analogous':     return [h, (h + 30) % 360, (h + 330) % 360];
    case 'triadic':       return [h, (h + 120) % 360, (h + 240) % 360];
    case 'split':         return [h, (h + 150) % 360, (h + 210) % 360];
    case 'tetradic':      return [h, (h + 90) % 360, (h + 180) % 360, (h + 270) % 360];
    default:              return [h];
  }
}

const harmonyRoleLabels = {
  complementary: ['Base', 'Complement'],
  analogous:     ['Base', 'Analog +30', 'Analog -30'],
  triadic:       ['Base', 'Triadic 2', 'Triadic 3'],
  split:         ['Base', 'Split 1', 'Split 2'],
  tetradic:      ['Base', 'Tetrad 2', 'Tetrad 3', 'Tetrad 4'],
};

function updateHarmonies() {
  const container = document.getElementById('harmony-swatches');
  container.innerHTML = '';
  const hues = harmonyHues(state.h);
  const roles = harmonyRoleLabels[activeHarmony] || [];

  hues.forEach((hue, i) => {
    const hex = hslToHex(hue, state.s, state.l);
    const wrap = document.createElement('div');
    wrap.className = 'harmony-swatch-wrap';
    wrap.title = `${hex.toUpperCase()} — click to select`;

    const swatch = document.createElement('div');
    swatch.className = 'harmony-swatch';
    swatch.style.background = `hsl(${hue},${state.s}%,${state.l}%)`;
    if (i === 0) swatch.style.borderColor = 'var(--accent)';

    const hexLabel = document.createElement('div');
    hexLabel.className = 'harmony-hex';
    hexLabel.textContent = hex.toUpperCase();

    const roleLabel = document.createElement('div');
    roleLabel.className = 'harmony-label';
    roleLabel.textContent = roles[i] || '';

    wrap.appendChild(swatch);
    wrap.appendChild(hexLabel);
    wrap.appendChild(roleLabel);
    wrap.addEventListener('click', () => {
      if (i === 0) return; // base already selected
      state.h = hue;
      refresh();
      addToRecent();
    });
    container.appendChild(wrap);
  });
}

// ======================================================
// Tints & Shades (10 steps + base = 11 swatches)
// ======================================================
function updateTints() {
  const container = document.getElementById('tints-row');
  container.innerHTML = '';

  // Steps 0-10: 0=white(tint), 5=base color, 10=black(shade)
  for (let i = 0; i <= 10; i++) {
    const t = i / 10; // 0=white, 1=black

    let s, l;
    if (t <= 0.5) {
      // Tint region: mix with white
      const mix = t / 0.5; // 0=white, 1=base
      s = Math.round(state.s * mix);
      l = Math.round(100 - (100 - state.l) * mix);
    } else {
      // Shade region: mix with black
      const mix = (t - 0.5) / 0.5; // 0=base, 1=black
      s = Math.round(state.s * (1 - mix * 0.6)); // saturation also drops to black
      l = Math.round(state.l * (1 - mix));
    }

    const hex = hslToHex(state.h, s, l);

    const wrap = document.createElement('div');
    wrap.className = 'tint-swatch-wrap';
    wrap.title = `${hex.toUpperCase()} — L:${l}%`;

    const swatch = document.createElement('div');
    swatch.className = 'tint-swatch';
    swatch.style.background = `hsl(${state.h},${s}%,${l}%)`;
    if (i === 5) {
      // Highlight base
      swatch.style.outline = '2px solid var(--accent)';
      swatch.style.outlineOffset = '1px';
    }

    const lbl = document.createElement('div');
    lbl.className = 'tint-label';
    lbl.textContent = `${l}%`;

    wrap.appendChild(swatch);
    wrap.appendChild(lbl);
    wrap.addEventListener('click', () => {
      state.s = s;
      state.l = l;
      refresh();
      addToRecent();
    });
    container.appendChild(wrap);
  }
}

// ======================================================
// Recent Colors
// ======================================================
function loadRecent() {
  try { return JSON.parse(localStorage.getItem('hsl-picker-recent') || '[]'); }
  catch { return []; }
}

function saveRecent(arr) {
  try { localStorage.setItem('hsl-picker-recent', JSON.stringify(arr)); } catch {}
}

function addToRecent() {
  const hex = hslToHex(state.h, state.s, state.l);
  let arr = loadRecent().filter(c => c.toLowerCase() !== hex.toLowerCase());
  arr.unshift(hex);
  saveRecent(arr.slice(0, 12));
  updateRecent();
}

function updateRecent() {
  const container = document.getElementById('recent-swatches');
  const arr = loadRecent();
  if (arr.length === 0) {
    container.innerHTML = '<div class="no-recent">No recent colors yet.</div>';
    return;
  }
  container.innerHTML = '';
  arr.forEach(hex => {
    const swatch = document.createElement('div');
    swatch.className = 'recent-swatch';
    swatch.style.background = hex;
    swatch.title = hex.toUpperCase() + ' — click to select';
    swatch.addEventListener('click', () => {
      const p = parseColorInput(hex);
      if (p) { Object.assign(state, { h: p.h, s: p.s, l: p.l }); refresh(); }
    });
    container.appendChild(swatch);
  });
}

// ======================================================
// Format Values
// ======================================================
function updateFormats() {
  const [r, g, b] = hslToRgb(state.h, state.s, state.l);
  const hex = hslToHex(state.h, state.s, state.l);
  const alpha = (state.a / 100).toFixed(2);
  const aHex = Math.round(state.a / 100 * 255).toString(16).padStart(2, '0');

  document.getElementById('fmt-hsl').value  = `hsl(${state.h}, ${state.s}%, ${state.l}%)`;
  document.getElementById('fmt-hsla').value = `hsla(${state.h}, ${state.s}%, ${state.l}%, ${alpha})`;
  document.getElementById('fmt-rgb').value  = `rgb(${r}, ${g}, ${b})`;
  document.getElementById('fmt-rgba').value = `rgba(${r}, ${g}, ${b}, ${alpha})`;
  document.getElementById('fmt-hex').value  = hex.toUpperCase();
  document.getElementById('fmt-hex8').value = (hex + aHex).toUpperCase();
}

// ======================================================
// Preview
// ======================================================
function updatePreview() {
  const hex = hslToHex(state.h, state.s, state.l).toUpperCase();
  const [r, g, b] = hslToRgb(state.h, state.s, state.l);
  const alpha = state.a / 100;

  document.getElementById('preview-color').style.background = `rgba(${r},${g},${b},${alpha})`;
  document.getElementById('preview-hex-big').textContent = hex;
  document.getElementById('preview-hsl-small').textContent =
    `hsl(${state.h}, ${state.s}%, ${state.l}%)` +
    (state.a < 100 ? ` / ${state.a}%` : '');
}

// ======================================================
// Sync Controls
// ======================================================
function syncControls() {
  slS.value = state.s; lblS.textContent = state.s + '%';
  slL.value = state.l; lblL.textContent = state.l + '%';
  slA.value = state.a; lblA.textContent = state.a + '%';
  updateSliderTracks();
  inH.value = state.h;
  inS.value = state.s;
  inL.value = state.l;
}

// ======================================================
// Master Refresh
// ======================================================
function refresh() {
  drawWheel();
  syncControls();
  updatePreview();
  updateFormats();
  updateHarmonies();
  updateTints();
}

// ======================================================
// Boot
// ======================================================
updateRecent();
refresh();
</script>
</body>
</html>
